# Application Configuration - Smart Tourist Agent

server.port=8080

# Default Database: H2 In-Memory
spring.datasource.url=jdbc:h2:mem:smarttouristdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA & Hibernate Settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Database Initialization Order
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Token Settings
jwt.secret=9a76a982ba7d41f1816e87f2231b14a2f8b5a32863a5f80b2a75ef7c992a2a0139b821966a982ba7d41f1816e87f2231b14a2
jwt.expiration=86400000

# File Upload Limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
